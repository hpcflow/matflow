name: Test demo workflows

env:
  PYTEST_ARGS: ""
  POETRY_VERSION: "2.1.3"
  PYTHON_VERSION: "3.13"
  MTEX_VERSION: "6.1.1"
  TMATE_DEBUGGING: false
  DEMO_WORKFLOWS: "all"

on:
  workflow_dispatch: # manual invocation
    inputs:
      python_version:
        description: "Python version"
        required: false
        default: "3.13"
      demo_workflows:
        description: "Which demo workflows to test?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - damask
          - mtex
      tmate_debugging:
        description: "Enable tmate debugging (https://github.com/marketplace/actions/debugging-with-tmate)"
        required: true
        default: false
        type: boolean
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

jobs:
  config:
    # this is required so we can have default values for the PR-triggered workflow, which
    # can't use the workflow_dispatch inputs.
    runs-on: ubuntu-latest
    outputs:
      python_version: ${{ steps.resolve.outputs.python_version }}
      tmate_debugging: ${{ steps.resolve.outputs.tmate_debugging }}
    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          echo "python_version=${{ inputs.python_version || '3.13' }}"    >> $GITHUB_OUTPUT
          echo "tmate_debugging=${{ inputs.tmate_debugging || 'false' }}" >> $GITHUB_OUTPUT

  test-damask-workflows:
    env:
      PYTHON_VERSION: ${{ needs.config.outputs.python_version }}
      TMATE_DEBUGGING: ${{ needs.config.outputs.tmate_debugging }}
    permissions:
      # No write permission
      contents: read
    runs-on: ubuntu-latest
    if: ${{ !inputs.demo_workflows || inputs.demo_workflows == 'all' || inputs.demo_workflows == 'damask' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup tmate session
        if: env.TMATE_DEBUGGING == 'true'
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Set up python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@main
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@main
        with:
          name: test-damask-demos
          version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          poetry install --without dev,pyinstaller

      - name: Store user and group IDs
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Install necessary pip packages
        run: |
          poetry run pip install damask-parse

      - name: Install necessary MatFlow environments
        id: configure_envs
        run: |
          poetry run matflow env setup python-all --use-current
          poetry run matflow env setup damask --docker-image damaskmultiphysics/damask-grid:3.0.2 --option u ${{ env.UID }}:${{ env.GID }}
          result=$(poetry run matflow env info source_file -n python_env)
          echo "env_source_file=$result" >> "$GITHUB_OUTPUT"

      - name: Run demo DAMASK workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: ok
        run: |
          poetry run matflow test --with-env-source ${{ steps.configure_envs.outputs.env_source_file }} --demo-damask-workflows

      - name: Upload all pytest temp dirs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-temp-damask
          path: /tmp/pytest-of-*

  test-mtex-workflows:
    env:
      PYTHON_VERSION: ${{ needs.config.outputs.python_version }}
      TMATE_DEBUGGING: ${{ needs.config.outputs.tmate_debugging }}
    permissions:
      # No write permission
      contents: read
    runs-on: ubuntu-latest
    if: ${{ !inputs.demo_workflows || inputs.demo_workflows == 'all' || inputs.demo_workflows == 'mtex' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup tmate session
        if: env.TMATE_DEBUGGING == 'true'
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Set up python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@main
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@main
        with:
          name: test-mtex-demos
          version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          poetry install --without dev,pyinstaller

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b

      - name: Get run-matlab-command
        run: |
          wget -O /usr/local/bin/run-matlab-command https://ssd.mathworks.com/supportfiles/ci/run-matlab-command/v2/glnxa64/run-matlab-command
          chmod +x /usr/local/bin/run-matlab-command

      - name: Run MATLAB Command
        run: run-matlab-command "disp('hello world')"

      - name: Download MTEX
        run: |
          curl -L -o mtex.zip https://github.com/mtex-toolbox/mtex/releases/download/mtex-${{ env.MTEX_VERSION }}/mtex-${{ env.MTEX_VERSION }}.zip
          unzip mtex.zip
          mv mtex-${{ env.MTEX_VERSION }} ${{ github.workspace }}/mtex

      - name: Patch MTEX
        run: |
          sed -i 's/if ((l >= m) %& (l >= n))/if (l >= m)/' ${{ github.workspace }}/mtex/EBSDAnalysis/@EBSD3square/spatialProfile.m

      - name: Check we can startup mtex
        run: run-matlab-command "run('${{ github.workspace }}/mtex/startup_mtex.m'); mex_install('force');"

      - name: Install necessary MatFlow environments
        id: configure_envs
        run: |
          poetry run matflow env setup python --use-current
          poetry run matflow env setup matlab --exe run-matlab-command --mtex-path ${{ github.workspace }}/mtex
          result=$(poetry run matflow env info source_file -n python_env)
          echo "env_source_file=$result" >> "$GITHUB_OUTPUT"

      - name: Run demo MTEX workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: ok
        run: |
          poetry run matflow test --with-env-source ${{ steps.configure_envs.outputs.env_source_file }} --demo-mtex-workflows

      - name: Upload all pytest temp dirs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-temp-mtex
          path: /tmp/pytest-of-*

      - name: Upload mtex
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: MTEX
          path: ${{ github.workspace }}/mtex
