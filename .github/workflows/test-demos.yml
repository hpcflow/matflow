name: Test demo workflows

env:
  PYTEST_ARGS: ""
  POETRY_VERSION: "2.1.3"
  PYTHON_VERSION: "3.13"
  MTEX_VERSION: "6.1.1"

on:
  workflow_dispatch: # manual invocation
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

jobs:
  test-damask-workflows:
    permissions:
      # No write permission
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@main
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@main
        with:
          name: test-damask-demos
          version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          poetry install --without dev,pyinstaller

      - name: Store user and group IDs
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Install necessary pip packages
        run: |
          poetry run pip install damask-parse

      - name: Install necessary MatFlow environments
        id: configure_envs
        run: |
          poetry run matflow env setup python-all --use-current
          poetry run matflow env setup damask --docker-image damaskmultiphysics/damask-grid:3.0.2 --option u ${{ env.UID }}:${{ env.GID }}
          result=$(poetry run matflow env info source_file -n python_env)
          echo "env_source_file=$result" >> "$GITHUB_OUTPUT"

      - name: Run demo DAMASK workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: ok
        run: |
          poetry run matflow test --with-env-source ${{ steps.configure_envs.outputs.env_source_file }} --demo-damask-workflows

      - name: Upload all pytest temp dirs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-temp
          path: /tmp/pytest-of-*

  test-mtex-workflows:
    permissions:
      # No write permission
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@main
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@main
        with:
          name: test-mtex-demos
          version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          poetry install --without dev,pyinstaller

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b

      - name: Download MTEX
        run: |
          curl -L -o mtex.zip https://github.com/mtex-toolbox/mtex/releases/download/mtex-${{ env.MTEX_VERSION }}/mtex-${{ env.MTEX_VERSION }}.zip
          unzip mtex.zip
          mv mtex-${{ env.MTEX_VERSION }} ${{ github.workspace }}/mtex

      - name: Install necessary MatFlow environments
        id: configure_envs
        run: |
          poetry run matflow env setup python --use-current
          poetry run matflow env setup matlab --exe matlab --mtex-path ${{ github.workspace }}/mtex
          result=$(poetry run matflow env info source_file -n python_env)
          echo "env_source_file=$result" >> "$GITHUB_OUTPUT"

      - name: Run demo MTEX workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: ok
        run: |
          poetry run matflow test --with-env-source ${{ steps.configure_envs.outputs.env_source_file }} --demo-mtex-workflows

      - name: Upload all pytest temp dirs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-temp
          path: /tmp/pytest-of-*
