- label: damask_geom_file
  name:
    name: geom.vti
  doc: DAMASK geometry file.

- label: damask_load_file
  name:
    name: load.yaml
  doc: DAMASK load file, as YAML.

- label: damask_material_file
  name:
    name: material.yaml
  doc: DAMASK material descriptor file.

- label: damask_numerics_file
  name:
    name: numerics.yaml
  doc: DAMASK numeric control file.

- label: damask_stdout_file
  name:
    name: stdout.log
  doc: DAMASK standard output.

- label: damask_stderr_file
  name:
    name: stderr.log
  doc: DAMASK standard error.

- label: damask_hdf5_file
  name:
    name: geom_load.hdf5
  doc: DAMASK geometry description, as HDF5.

- label: damask_viz_files
  name:
    name: ((?:geom_load_inc\d+|static_outputs).vt(i|r))
    is_regex: true
  doc: DAMASK output visualisation data pattern.

- label: mtex_pole_figures
  name:
    name: pole_figure.png
  doc: MTEX figures of poles.

- label: mtex_inverse_pole_figures
  name:
    name: inverse_pole_figure.png
  doc: MTEX figure of inverse pole.

- label: mtex_IPF_key
  name:
    name: IPF_key\.png
    is_regex: true
  doc: Key image for MTEX inverse pole figures.

- label: dream_3D_pipeline
  name:
    name: pipeline.json
  doc: DREAM.3D pipeline description.

- label: dream_3D_hdf5_file
  name:
    name: pipeline.dream3d
  doc: DREAM.3D pipeline data.

- label: dream_3D_XDMF_file
  name:
    name: pipeline.xdmf
  doc: DREAM.3D model data and metadata.

- label: jax_cpfem_mesh_data
  name:
    name: mesh.npz
  doc: >
    Information that we can use to generate a JAX-FEM hexahedral ("box") `Mesh` 
    object, and associate each grain with quaternion orientations.
- label: jax_cpfem_model_script
  name:
    name: model.py
  doc: >
    JAX-CPFEM model definition script, including material parameter definitions.
- label: jax_cpfem_problem_script
  name:
    name: problem.py
  doc: JAX-CPFEM problem definition script, including boundary condition definitions.
- label: jax_cpfem_slip_systems
  name:
    name: input_slip_sys.txt
  doc: Slip systems to model.
- label: jax_cpfem_stdout
  name:
    name: stdout.log
  doc: Standard output stream from a JAX-CPFEM simulation.
- label: jax_cpfem_stderr
  name:
    name: stderr.log
  doc: Standard error stream from a JAX-CPFEM simulation.
