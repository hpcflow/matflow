template_components:
  command_files:
    - label: gmsh_geo_file
      name:
        name: script.geo
      doc: Gmsh geometry script file.
    - label: gmsh_mesh_file
      name:
        name: (.*\.msh)
        is_regex: true
      doc: Gmsh mesh file, typically generated from a Gmsh .geo script.
  task_schemas:
    - objective: generate_mesh
      method: gmsh
      inputs:
        - parameter: geometry_name
        - parameter: plate_width
          default_value: 100e-3
        - parameter: plate_thickness
          default_value: 2e-3
        - parameter: hole_diameter
          default_value: 25e-3
        - parameter: plate_thick_layers
          default_value: 2
        - parameter: hole_sect_nodes
          default_value: 9 # must be odd; number of nodes around a quadrant of the circumference of the hole
        - parameter: plate_radial_nodes
          default_value: 9 # number of nodes from the hole to the edges of the central section
        - parameter: plate_diff
          default_value: 50e-3 # length of rectangular extension
        - parameter: plate_diff_nodes
          default_value: 5 # number of nodes along the rectangular extension
      outputs:
        - parameter: gmsh_mesh_str
      actions:
        - environments:
            any: gmsh_env
          input_file_generators:
            - input_file: gmsh_geo_file
              from_inputs:
                - geometry_name
                - plate_width
                - plate_thickness
                - hole_diameter
                - plate_thick_layers
                - hole_sect_nodes
                - plate_radial_nodes
                - plate_diff_nodes
                - plate_diff
              jinja_template: gmsh/<<parameter:geometry_name>>.geo
          script: <<script:gmsh/run_geo.py>>
          script_exe: python_script
          script_data_in:
            input_files.gmsh_geo_file: direct
          script_data_out:
            outputs.gmsh_mesh_str: direct
          requires_dir: true

    - objective: simulation
      implementation: moose
      inputs:
        - parameter: gmsh_mesh_str
        - parameter: input_deck
        - parameter: input_deck_variables
          default_value: null
      actions:
        - environments:
            any: python_env
            main: moose_env
          input_file_generators:
            - input_file: gmsh_mesh_file
              from_inputs: [gmsh_mesh_str]
              script: <<script:moose/dump_mesh.py>>
            - input_file: moose_input_deck
              from_inputs: [input_deck, input_deck_variables]
              script_data_in:
                input_deck: direct
              script: <<script:moose/write_input.py>>
          abortable: true
          commands:
            - command: <<executable:proteus>> -i input.i
              stdout: stdout.log
              stderr: stderr.log

tasks:
  - schema: generate_mesh_gmsh
    # input_files:
    #   gmsh_geo_file: D:/scratch/script.geo
    inputs:
      geometry_name: plate_with_hole
      plate_width: 100e-3
      plate_thickness: 2e-3
      hole_diameter: 25e-3
      plate_thick_layers: 2
      # hole_sect_nodes: 9
      # plate_radial_nodes: 9
      # plate_diff_nodes: 5
      plate_diff: 50e-3

  - schema: simulation_moose
    resources:
      main:
        shell: wsl
    inputs:
      input_deck_variables:
        endTime: 8
        timeStep: 1
        # Mechanical Loads/BCs
        topDispRate: ${fparse 1e-3 / endTime} # m/s
        # Mechanical Props: SS316L @ 20degC
        ss316LEMod: 200e9 # Pa
        ss316LPRatio: 0.3 # -
      input_deck:
        GlobalParams:
          displacements: "'disp_x disp_y disp_z'"
        Mesh:
          type: FileMesh
          file: mesh.msh
        Modules/TensorMechanics/Master:
          all:
            strain: SMALL
            incremental: true
            add_variables: true
            material_output_family: MONOMIAL # MONOMIAL, LAGRANGE
            material_output_order: FIRST # CONSTANT, FIRST, SECOND,
            generate_output: "'vonmises_stress strain_xx strain_xy strain_xz strain_yx strain_yy strain_yz strain_zx strain_zy strain_zz stress_xx stress_xy stress_xz stress_yx stress_yy stress_yz stress_zx stress_zy stress_zz max_principal_strain mid_principal_strain min_principal_strain'"
        BCs:
          bottom_x:
            type: DirichletBC
            variable: disp_x
            boundary: "'bc-base-disp'"
            value: 0.0
          bottom_y:
            type: DirichletBC
            variable: disp_y
            boundary: "'bc-base-disp'"
            value: 0.0
          bottom_z:
            type: DirichletBC
            variable: disp_z
            boundary: "'bc-base-disp'"
            value: 0.0
          top_x:
            type: DirichletBC
            variable: disp_x
            boundary: "'bc-top-disp'"
            value: 0.0
          top_y:
            type: FunctionDirichletBC
            variable: disp_y
            boundary: "'bc-top-disp'"
            function: "'${topDispRate}*t'"
          top_z:
            type: DirichletBC
            variable: disp_z
            boundary: "'bc-top-disp'"
            value: 0.0
        Materials:
          elasticity:
            type: ComputeIsotropicElasticityTensor
            youngs_modulus: ${ss316LEMod}
            poissons_ratio: ${ss316LPRatio}
          stress:
            type: ComputeFiniteStrainElasticStress
        Preconditioning:
          SMP:
            type: SMP
            full: true
        Executioner:
          type: Transient
          solve_type: "'PJFNK'"
          petsc_options_iname: "'-pc_type -pc_hypre_type'"
          petsc_options_value: "'hypre boomeramg'"
          end_time: ${endTime}
          dt: ${timeStep}
        Postprocessors:
          react_y_bot:
            type: SidesetReaction
            direction: "'0 1 0'"
            stress_tensor: stress
            boundary: "bc-base-disp"
          react_y_top:
            type: SidesetReaction
            direction: "'0 1 0'"
            stress_tensor: stress
            boundary: "bc-top-disp"
          disp_y_max:
            type: NodalExtremeValue
            variable: disp_y
          disp_x_max:
            type: NodalExtremeValue
            variable: disp_x
          disp_z_max:
            type: NodalExtremeValue
            variable: disp_x
        Outputs:
          exodus: true
