  - name: generate_phase_field_input
    method: from_volume_element
    software: cipher
    run_options:
      l: short
      num_cores: 2
    base:
      materials:
        - name: sub-grain-matrix
          properties:
            chemicalenergy: none
            molarvolume: 1e-5
            temperature0: 500.0

      interfaces:
        - materials: [sub-grain-matrix, sub-grain-matrix]
          properties:
            width: 6.0
            energy:
              e0: 1.0e+8
            mobility:
              m0: 3.333e-11

      components: [ti]
      outputs: [phaseid, matid, interfaceid, 0_phi]
      solution_parameters:
        abstol: 0.0001
        amrinterval: 25
        initblocksize: [1, 1]
        initcoarsen: 9
        initrefine: 9
        interpolation: cubic
        maxnrefine: 9
        minnrefine: 0
        outfile: out
        outputfreq: 100
        petscoptions: -ts_adapt_monitor -ts_rk_type 2a
        random_seed: 1579993586
        reltol: 0.0001
        time: 1000_000
      interface_binning: # specify one or both of energy_range/mobility_range:
        base_interface_name: sub-grain-matrix-sub-grain-matrix
        theta_max: 50
        bin_width: 1
        energy_range: [0.1e+8, 0.555e+8]
        mobility_range: [2.105e-11, 10.0e-11]
        n: 7 # mobility parameter
        B: 625 # mobility parameter

  - name: simulate_grain_growth
    method: phase_field
    software: cipher
    base:
      num_VTU_files: 22
      derive_outputs:
        - name: num_voxels_per_phase
      save_outputs:
        - name: phaseid
          time_interval: 5_000
        - name: matid
          number: 4
        - name: interfaceid
          number: 4
        - name: 0_phi
          number: 4
        - name: num_voxels_per_phase
          time_interval: 5_000
      delete_VTUs: true
    run_options:
      num_cores: 8
