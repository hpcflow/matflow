doc:
  - WIP: Monte Carlo estimator for the probability of failure (yield stress) with DAMASK.

template_components:
  task_schemas:
    - objective: evaluate_monte_carlo_estimator
      inputs:
        - parameter: g
          group: all
      outputs:
        - parameter: monte_carlo_estimator
      actions:
        - script: <<script:uq/evaluate_monte_carlo_estimator.py>>
          script_data_in: direct
          script_data_out: direct
          script_exe: python_script
          environments:
            - scope:
                type: any
              environment: damask_parse_env

environments:
  python_env:
    poetry_env: true
  damask_parse_env:
    poetry_env: true

resources:
  any:
    scheduler_args:
      directives:
        --partition: ukaea-spr
        --time: 00:30:00
    combine_scripts: true

tasks:
  - schema: sample_direct_MC
    repeats: 1000
    inputs:
      dimension: 120 # 20 grains * (3 seed point dimensions + 3 orientation dimensions)
  - schema: generate_volume_element_from_voronoi_random_variates
    inputs:
      VE_grid_size: [64, 64, 64]
      VE_size: [1, 1, 1]
      phase_label: Al
    groups:
      - name: all
  - schema: simulate_VE_loading_damask
    resources:
      any:
        combine_scripts: false
        num_cores: 8
    inputs:
      load_case::uniaxial:
        total_time: 5
        num_increments: 20
        direction: x
        target_def_grad_rate: 1.0e-3
        dump_frequency: 1
      homogenization:
        SX:
          mechanical: { type: "pass" }
          N_constituents: 1
      damask_phases:
        Al:
          lattice: cF
          mechanical:
            output: [F, P, F_p]
            elastic:
              type: Hooke
              C_11: 106750000000
              C_12: 60410000000
              C_44: 28340000000
            plastic:
              type: phenopowerlaw
              N_sl: [12]
              a_sl: 2.25
              atol_xi: 1
              dot_gamma_0_sl: 0.001
              h_0_sl-sl: 75.0e+6
              h_sl-sl: [1, 1, 1.4, 1.4, 1.4, 1.4, 1.4]
              n_sl: 20
              output: [xi_sl]
              xi_0_sl: [31.0e+6]
              xi_inf_sl: [63.0e+6]
      damask_post_processing:
        - name: add_stress_Cauchy
          args: { P: P, F: F }
          opts: { add_Mises: true }
        - name: add_strain
          args: { F: F_p, t: V, m: 0 }
          opts: { add_Mises: true }
      VE_response_data:
        phase_data:
          - field_name: sigma_vM
            phase_name: Al
            out_name: vol_avg_equivalent_stress
            transforms: [{ mean_along_axes: 1 }]
          - field_name: epsilon_V^0(F_p)_vM
            phase_name: Al
            out_name: vol_avg_equivalent_plastic_strain
            transforms: [{ mean_along_axes: 1 }]
      calculate_yield_stress:
        yield_point: 0.002
      remove_damask_hdf5: true
  - schema: evaluate_yield_stress_limit_state
    inputs:
      threshold_yield_stress: 83.0e+6
    groups:
      - name: all
  - schema: evaluate_monte_carlo_estimator
