doc:
  - >
    Run an OpenFOAM crystal plasticity simulation from a Voronoi-tessellated
    geometry.
  - >
    TODO: microstructures generated by either: Voronoi tessellation or from phase-field 
    simulation output, in which case we copy the n.0, n.1, ... files directly.
  - >
    Note: specified orientations are used to build the volume element, but in volume 
    element construction, they are transformed to quaternions. The orientations format
    required by openFOAM is Euler angles within (possibly) the Tait-Bryan convention (not 
    Bunge), which we don't yet support, so the transformed quaternions would be incorrect.
    Thus, in addition to the volume element we pass the orientations directly as specified
    from the generate VE task to the simulate task.
  - >
    TODO: double check this in write_phase_ID_files.py: Ordering is determined by mesh indexing.
    For a single-hexa block with (nx, ny, nz) cells, the default enumeration is x->y->z
    corresponding to column-major. Tested with 2 and 3 grains and the grains are defined ok,
    so column-major is correct but there might be a rotation of the box that's needed.
  - >
    Note: our volume element representation does not yet include an origin argument,
    so we pass this directly to the simulate task.

template_components:
  command_files:
    - label: open_foam_phase_bool_files
      name:
        name: (n\.\d+)
        is_regex: true
      doc: >
        Each file (named according to phase ID) contains a flattened boolean array
        describing where that phase exists within the volume element.
    - label: open_foam_grain_properties_file
      name:
        name: GrainProperties
      doc: >
        A file that contains grain orientations and material properties, including 
        elasticity tensors, slip systems, and critical resolved shear stresses.
    - label: open_foam_block_mesh_file
      name:
        name: blockMeshDict
      doc: >
        A file that contains the model geometry, and includes voxel discretisation (grid
        dimensions), the model's physical dimensions, and boundary conditions. This file
        parametrises OpenFOAM's `blockMesh` mesh generation utility. See: https://www.openfoam.com/documentation/user-guide/4-mesh-generation-and-conversion/4.3-mesh-generation-with-the-blockmesh-utility.
  task_schemas:
    - objective: simulate_VE_loading
      implementation: OpenFOAM
      inputs:
        - parameter: volume_element
        - parameter: materials
        - parameter: orientations
        - parameter: VE_origin
        - parameter: boundary
        - parameter: root_path
        - parameter: app_name
      actions:
        - environments:
            - scope:
                type: processing
              environment: python_env
            - scope:
                type: main
              environment: OpenFOAM
          input_file_generators:
            - input_file: open_foam_phase_bool_files
              from_inputs: [volume_element]
              script: <<script:open_foam/write_phase_ID_files.py>>
            - input_file: open_foam_grain_properties_file
              from_inputs: [volume_element, orientations, materials]
              script: <<script:open_foam/write_grain_properties.py>>
            - input_file: open_foam_block_mesh_file
              from_inputs: [volume_element, VE_origin, boundary]
              script: <<script:open_foam/write_block_mesh_file.py>>
          commands:
            - command: cp -r <<parameter:root_path>>/system <<parameter:root_path>>/constant <<parameter:root_path>>/initial .
            - command: rm initial/n.*
            - command: mv n.* initial/.
            - command: cp -r initial 0
            - command: mv GrainProperties constant/.
            - command: mv blockMeshDict system/.
            - command: APP_PATH=blockMesh
            - command: <<executable:openfoam_app>> &> blockMesh.log
            # - command: APP_PATH=voronoiFoam
            # - command: <<executable:openfoam_app>> &> voronoiFoam.log
            - command: APP_PATH=decomposePar
            - command: <<executable:openfoam_app>> &> decomposePar.log
            - command: APP_PATH=<<parameter:app_name>>
            - command: mpirun -np $SLURM_NTASKS <<executable:openfoam_app>> -parallel &> <<parameter:app_name>>.log              
            - command: APP_PATH=reconstructPar

# TODO: pass boundary info into phase bool files

resources:
  any:
    scheduler_args:
      directives:
        --time: 00:20:00
        --partition: serial

tasks:
  - schema: generate_volume_element_from_voronoi
    inputs:
      VE_grid_size: [10, 200, 200]
      periodic: false
      microstructure_seeds:
        box_size: [0.1, 0.2, 0.2]
        phase_label: Fe-35Ni
        position:
          - [0.05, 0.05, 0.1]
          - [0.05, 0.1, 0.15]
          - [0.05, 0.15, 0.1]
      orientations:
        data:
          - [0.78539816, 0.61547971, 0.0]
          - [0.95531662, 0.0, 0.78539816]
          - [0.95531662, 0.0, 0.78539816]
        unit_cell_alignment:
          x: a
          y: b
          z: c
        representation:
          type: euler
          euler_definition: bunge # WRONG! (but currently inconsequential)
          euler_is_degrees: false

  - schema: visualise_VE_VTK

  - schema: simulate_VE_loading_OpenFOAM
    resources:
      main:
        num_cores: 2
        scheduler_args:
          directives:
            --time: 1:00:00
            --partition: multicore          
    inputs:
      VE_origin: [-0.05, 0.0, 0.0]
      boundary:
        - patch_name: lowerWall # user-specified name for the patch, use camelCase
          face_normals: [+x2] # {+/-}{x1,x2,x3} for the normal of the face, when looking from in the middle of the block
          type: wall # select from available patch types
        - patch_name: atmosphere
          face_normals: [-x2]
          type: patch
        - patch_name: rightWall
          face_normals: [+x1]
          type: empty
        - patch_name: leftWall
          face_normals: [-x1]
          type: empty
        - patch_name: frontAndBack
          face_normals: [-x3, +x3]
          type: patch
      # boundary_field: # TODO; map patch names to zeroGradient/empty
      materials:
        - label: Fe-35Ni
          slip_systems: # plane and direction?
            - [[0.577, 0.577, 0.577], [0, 0.707, -0.707]]
            - [[0.577, 0.577, 0.577], [-0.707, 0.0, 0.707]]
            - [[0.577, 0.577, 0.577], [0.707, -0.707, 0.0]]

            - [[-0.577, -0.577, 0.577], [0, -0.707, -0.707]]
            - [[-0.577, -0.577, 0.577], [0.707, 0.0, 0.707]]
            - [[-0.577, -0.577, 0.577], [-0.707, 0.707, 0.0]]

            - [[-0.577, 0.577, 0.577], [0.0, 0.707, -0.707]]
            - [[-0.577, 0.577, 0.577], [0.707, 0.0, 0.707]]
            - [[-0.577, 0.577, 0.577], [-0.707, -0.707, 0.0]]

            - [[0.577, -0.577, 0.577], [0, -0.707, -0.707]]
            - [[0.577, -0.577, 0.577], [-0.707, 0.0, 0.707]]
            - [[0.577, -0.577, 0.577], [0.707, 0.707, 0.0]]
          elasticity:
            C0000: 1.40E11 #	1.40E11; 	9.20E10;	1.11E11
            C1111: 1.40E11
            C2222: 1.40E11
            C1010: 1.11E11
            C2020: 1.11E11
            C0011: 9.20E10
            C1001: 1.11E11
            C0022: 9.20E10
            C2002: 1.11E11
            C0110: 1.11E11
            C1100: 9.20E10
            C0101: 1.11E11
            C2121: 1.11E11
            C1122: 9.20E10
            C2112: 1.11E11
            C0220: 1.11E11
            C2200: 9.20E10
            C1221: 1.11E11
            C2211: 9.20E10
            C0202: 1.11E11
            C1212: 1.11E11
          properties:
            initialCRSS: 16e6
            tau_S: 148e6
            h_0: 180e6
            r: 1.1
            k_exponent: 10.0
            gammadot_0: 1e-3
      app_name: Euler_Solid_MechFoam_Oct24
      # block_mesh: true
      # decompose_par: true
      # voronoi: false
      root_path: /mnt/iusers01/mace01/mbgm9my2/scratch/cp-sims/case_2p_6

