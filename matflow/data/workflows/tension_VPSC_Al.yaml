doc:
  - >
    A simple crystal plasticity simulation using VPSC. A volume element generated from a
    random voronoi tessellation is loaded uniaxially, using aluminium (Al) material
    parameters.
tasks:
  - schema: define_orientations
    inputs:
      orientations::from_file:
        path: /mnt/iusers01/jf01/y15576gb/scratch/novelis_cp/vpsc/460_6014_0_eulers.txt
        delimiter: "\t"
        start_index: 1 # skip header
        unit_cell_alignment:
          x: a
          y: b
          z: c
        representation:
          type: euler
          euler_is_degrees: false
          euler_definition: bunge

  - schema: simulate_orientations_loading_vpsc
    inputs:
      load_case::uniaxial:
        total_time: 1
        num_increments: 100
        direction: x
        target_vel_grad: 0.01
        dump_frequency: 1
      phases:
        Al:
          lattice: CUBIC
          mechanical:
            elastic:
              type: Hooke
              C_11: 106750000000
              C_12: 60410000000
              C_44: 28340000000
            plastic:
              type: voce
              slip_modes: [12]
              twin_modes: []
              hlatex: 1.4
              nrsx: 20
              tau0x: 40
              tau1x: 10
              thet0: 400 
              thet1: 1
              hpfac: 0
