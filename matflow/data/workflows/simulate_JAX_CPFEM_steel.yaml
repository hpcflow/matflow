tasks:
  - schema: generate_volume_element_from_voronoi
    inputs:
      periodic: false
      VE_grid_size: [8, 8, 8]
      orientations:
        data:
          - [
              -0.44841562434329973,
              0.16860994035907192,
              -0.3509983118612716,
              0.8045460216342235,
            ]
          - [
              -0.1721519777399991,
              0.1221784375558591,
              -0.7486299266954833,
              -0.628481788767607,
            ]
          - [
              0.1755902645854752,
              -0.8369269701982096,
              0.21157163334810386,
              0.4732428018470682,
            ]
          - [
              -0.8663740014241987,
              -0.187241901559973,
              0.4235298570897932,
              -0.18697331389780547,
            ]
          - [
              -0.9366201723048194,
              0.07470626885605275,
              0.34088334168529333,
              0.03098666788741778,
            ]
          - [
              -0.462754124567833,
              -0.3500710695060419,
              -0.3866988406362011,
              -0.7167795150120938,
            ]
          - [
              -0.6587757263479669,
              -0.16019499696083303,
              -0.3423669060109474,
              0.6504898208211397,
            ]
          - [
              0.1985059035197109,
              0.6384482594496135,
              0.05206231874156126,
              0.7418010118898696,
            ]
        unit_cell_alignment: { x: a, y: b, z: c }
        representation:
          type: quaternion
          quat_order: scalar_vector
      microstructure_seeds::from_random:
        num_seeds: 8
        box_size: [0.016, 0.016, 0.016]
        phase_label: 304_steel

  - schema: visualise_VE_VTK

  - schema: simulate_VE_loading_JAX_CPFEM
    inputs:
      material_parameters:
        C11: 2.622e5 # MPa
        C12: 1.120e5 # MPa
        C44: 0.746e5 # MPa
        r: 1 # latent hardening
        gss_initial: 90 # initial flow stress, in MPa
        h: 392.9772 # initial hardening, in MPa
        t_sat: 7295.1754 # saturation strength, in MPa
        gss_a: 8 # 'a' in Kalidini model
        ao: 0.001 # reference strain rate
        xm_d: 120 # rate sensitivity exponent (denominator)
      solver_options:
        name: jax_solver
      numerics:
        newton_max_sub_step: 8
      loading:
        strain: 0.01
        direction: x # reproduces example, but should be z?
        total_time: 0.1
        num_increments: 50
        dirichlet_BCs:
          - points: corner
            values:
              u_x: 0
              u_y: 0
          - points: bottom
            values:
              u_z: 0
          - points: top
            values:
              u_z: u(t)
