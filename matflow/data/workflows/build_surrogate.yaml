template_components:
  task_schemas:
    - objective: build_surrogate
      inputs:
        - parameter: X_train
        - parameter: Y_train
        - parameter: parameter_names
        - parameter: n_restarts_optimizer
          default_value: 5
        - parameter: cross_validate
          default_value: true
        - parameter: scoring
          default_value: r2
        - parameter: normalize_y
          default_value: true
        - parameter: validate
          default_value: false
        - parameter: X_test
          default_value: null
        - parameter: Y_test
          default_value: null
      outputs:
        - parameter: surrogate
        - parameter: validation
        - parameter: versions
      actions:
        - environments:
            - scope:
                type: any
              environment: sklearn_env
          script: <<script:surrogates/build_surrogate.py>>
          script_data_in: direct
          script_data_out: direct
          script_exe: python_script
    - objective: fit_surrogate_from_test_data
      inputs:
        - parameter: surrogate
        - parameter: Y_test
        - parameter: test_index
        - parameter: test_error
        - parameter: iters
        - parameter: n
        - parameter: use_std
      outputs:
        - parameter: fitted_x
        - parameter: optimize_result
      actions:
        - environments:
            - scope:
                type: any
              environment: sklearn_env
          script: <<script:surrogates/fit_surrogate.py>>
          script_data_in: direct
          script_data_out: direct
          script_exe: python_script

tasks:
  - schema: build_surrogate
    inputs:
      # TODO add as demo-data
      X_train::from_load_txt:
        file_path: D:/others_code/surrogatetools/examples/data/X_train.txt
      Y_train::from_load_txt:
        file_path: D:/others_code/surrogatetools/examples/data/Y_train.txt
      X_test::from_load_txt:
        file_path: D:/others_code/surrogatetools/examples/data/X_test.txt
      Y_test::from_load_txt:
        file_path: D:/others_code/surrogatetools/examples/data/Y_test.txt
      validate: true
      parameter_names:
        - a_1
        - a_2
        - a_3
        - a_4

  - schema: fit_surrogate_from_test_data
    inputs:
      test_index: 3
      test_error: 0.01
      iters: 5
      n: 250
      use_std: true
